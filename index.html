<!DOCTYPE html>
<html>
<head>
<title>Advanced Finance Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

.app {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 95%;
  padding: 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
}

.result {
  margin-top: 15px;
  text-align: left;
}
</style>
</head>

<body>

<div class="app">
  <h2>💰 Advanced EMI Calculator</h2>

  <input id="amount" placeholder="Loan Amount ₹">
  <input id="rate" placeholder="Interest Rate (%)">
  <input id="months" placeholder="Tenure (Months)">
  
  <input id="fee" placeholder="Processing Fee (%)">
  <input id="fileCharge" placeholder="File Charge ₹">
  <input id="insurance" placeholder="Insurance ₹">

  <button onclick="calculateEMI()">Calculate EMI</button>

  <div class="result" id="result"></div>
</div>

<p style="color:gray;">Powered by राकेश खुडिया, रावला मंडी</p>

<script>
function calculateEMI() {
  let P = parseFloat(document.getElementById("amount").value);
  let R = parseFloat(document.getElementById("rate").value) / 12 / 100;
  let N = parseFloat(document.getElementById("months").value);

  let feePercent = parseFloat(document.getElementById("fee").value) || 0;
  let fileCharge = parseFloat(document.getElementById("fileCharge").value) || 0;
  let insurance = parseFloat(document.getElementById("insurance").value) || 0;

  let processingFee = (P * feePercent) / 100;

  let finalLoan = P + processingFee + fileCharge + insurance;

  let emi = (finalLoan * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

  let totalPayment = emi * N;
  let totalInterest = totalPayment - finalLoan;

  document.getElementById("result").innerHTML =
    "<b>📊 Loan Breakdown</b><br>" +
    "Loan Amount: ₹" + P + "<br>" +
    "Processing Fee: ₹" + processingFee.toFixed(0) + "<br>" +
    "File Charge: ₹" + fileCharge + "<br>" +
    "Insurance: ₹" + insurance + "<br>" +
    "<hr>" +
    "<b>Total Loan: ₹" + finalLoan.toFixed(0) + "</b><br><br>" +
    "<b>📅 EMI: ₹" + emi.toFixed(0) + "</b><br>" +
    "Total Payment: ₹" + totalPayment.toFixed(0) + "<br>" +
    "Total Interest: ₹" + totalInterest.toFixed(0);
}
</script>

</body>
</html>
