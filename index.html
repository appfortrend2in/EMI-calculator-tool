<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator - Trend2in</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  text-align:center;
  padding:20px;
}
.container {
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  max-width:400px;
  margin:auto;
}
input {
  width:90%;
  padding:10px;
  margin:10px 0;
}
button {
  background:#007bff;
  color:white;
  padding:10px;
  border:none;
  width:100%;
}
.result {
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
}
.ad-box {
  margin:20px 0;
}
</style>
</head>

<body>

<div class="container">
<h2>EMI Calculator</h2>

<div class="ad-box">
<!-- TOP AD -->
<script async src="YOUR_AD_SCRIPT"></script>
</div>

<input type="number" id="amount" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="months" placeholder="Time (Months)">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="result" id="result"></div>

<div class="ad-box">
<!-- BOTTOM AD -->
<script async src="YOUR_AD_SCRIPT"></script>
</div>

</div>

<script>
function calculateEMI() {
  let P = document.getElementById("amount").value;
  let R = document.getElementById("rate").value / 12 / 100;
  let N = document.getElementById("months").value;

  let EMI = (P * R * Math.pow(1+R,N)) / (Math.pow(1+R,N)-1);

  document.getElementById("result").innerHTML =
    "Monthly EMI: ₹ " + EMI.toFixed(2);
}
</script>

</body>
</html>
